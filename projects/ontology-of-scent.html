      <section class="feed">

        <figure>
          <img class="img" src="../images/work/ChatGPT Image Mar 23, 2026, 11_09_51 PM.png" alt="" style="aspect-ratio: auto; height: auto; object-fit: contain;" />
          <figcaption>
            <div class="cap-top">Ontology of Scent <span class="cap-sub">— large structure</span></div>
            <div class="cap-sub">Ontology of Scent proposes a new paradigm for designing with scent. Petrichor is the earthy, pleasant scent produced when rain falls on dry soil. A bacteria named Streptomyces releases a compound called geosmin into the air. This volatile organic compound (VOC) produces a scent that humans can smell at tiny concentrations. Our ancestors formed a positive association with the smell. In short - it makes us happy. This project proposes a way of turning that scent into a physical form that we can fabricate and control. </div>
          </figcaption>
        </figure>

        <div class="twoUp">
          <figure>
            <img class="img" src="../images/work/Screenshot 2026-03-08 at 16.28.15.png" alt="" style="aspect-ratio: auto; height: auto; object-fit: contain;" />
            <figcaption>
              <div class="cap-top">Material development <span class="cap-sub">— validating the extrusion method</span></div>
              <div class="cap-sub">A hydrogel mixture with Streptomyces bacteria was extruded onto pegged supports. This hydrogel print is cross-linked with calcium chloride and solidifies into a flexible, silicon-like structure. Without support the material will shrink during cross-linking. Pegged supports were printed in order to keep the desired form, controling the shape of the final piece. This material design study shows an innovative method for designing a living fabric. After cross-linking the mesh is self-supporting and hosts the geosmin-producing bacteria. We were able to cultivate the bacteria within the mesh and successfully produced petrichor in a living canopy. </div>
            </figcaption>
          </figure>

          <figure>
            <img class="img" src="../images/work/Screenshot 2026-03-08 at 16.28.12.png" alt="" style="aspect-ratio: auto; height: auto; object-fit: contain;" />
            <figcaption>
              <div class="cap-top">Non-planar Extrusion <span class="cap-sub">— advanced robotic fabrication of living material</span></div>
              <div class="cap-sub">Building on the success of our initial test the design was pushed further. Non-planar prints were performed onto a flexible fabric support with a robotic arm. The supporting structure successfully held the extruded hydrogel and allowed us to demonstrate greater control over the form of the mesh. These studies unlock new possibilities to design large-scale canopy structures with living material. </div>
            </figcaption>
          </figure>
        </div>
