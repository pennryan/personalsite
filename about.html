            <div class="cap-sub">
              Penn Ryan is a designer based in London working on projects across architecture and ecology. He uses computational tools and digital manufacturing to make a more climate resilient built environment. He received his MArch in Bio-Integrated Design from the Bartlett School of Architecture. His final research. MycoAir: Mycelium Air Filtration for the London Underground has been presented in conferences across Europe.
              <br><br>
              He is currently designing bio-receptive facade systems that provide habitat for bird and insects with Phyta Biodesign. His role as lead computational deisgner and digital fabricator keeps him engaged in all aspects of design from concept to scripting, printing, and installation.
