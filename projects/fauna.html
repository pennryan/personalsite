      <section class="feed">

        <figure>
          <img class="img" src="../images/work/exterior-sweep-higherdef.png" alt="FAUNA hero image" />
          <figcaption>
            <div class="cap-top">FAUNA <span class="cap-sub">— façade habitat system designed for Phyta Biodesign</span></div>
            <div class="cap-sub">FAUNA is a bioreceptive facade system designed to provide habitat for birds and insects. The modules leverage computational design and digital fabrication to improve the biodiversity of the built environment. Modules were redesigned to integrate environmental and species data. Digital fabrication techniques are leveraged to produce a design that is site-specific and modular.</div>
          </figcaption>
        </figure>

        <div class="twoUp">
          <figure>
            <img class="img" src="../images/work/fauna-ceramic-habitatated.jpg" alt="" style="aspect-ratio: 1 / 1;" />
            <figcaption>
              <div class="cap-top">Version 1.0 <span class="cap-sub">— pilot study</span></div>
              <div class="cap-sub">3D printed ceramic modules installed on site at Cody Dock in Canning Town, London. Bioreceptive ceramic enhances the module's ability to host growth of moss and lichen. </div>
            </figcaption>
          </figure>

          <figure>
            <img class="img" src="../images/work/fauna-wren-flowers-sideview.jpg" alt="" style="aspect-ratio: 1 / 1;" />
            <figcaption>
              <div class="cap-top">Version 2.0 <span class="cap-sub">— computational design + fabrication iteration</span></div>
              <div class="cap-sub">Fauna designed for use by London Priority Bird Species. These modules integrate wren species data and requirements into parametric Grasshopper script. Attributes such as aperture opening size prevent predation by larger birds. Height along the facade is optimized for wren nesting patterns. Internal volume provides sufficient space for species-spcific nesting needs.</div>
            </figcaption>
          </figure>
        </div>

        <figure>
          <img class="img" src="../images/work/fauna-wren-flowers.jpg" alt="" style="aspect-ratio: 16 / 9;" />
          <figcaption>
            <div class="cap-top">Install <span class="cap-sub">— context</span></div>
            <div class="cap-sub">Installed pieces at site on the roof of Here East in Hackney Wick, London. Modules are printed from a composite material made of PLA and wood fibers. Using consumer-grade printers allows for quick and cheap iteration of the product. Lightweight and robust biomaterial improves ease of installation compared to ceramic and gives the system a lighter weight on building facades. It is crucial to reduce overall weight when installing the product across many square meters of facade surface.</div>
          </figcaption>
        </figure>
